version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/uwsgi"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 4
    rebase-strategy: "disabled"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      python-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "python"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      actions-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
