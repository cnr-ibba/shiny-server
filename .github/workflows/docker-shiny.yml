name: Build and push Shiny Docker images (matrix)

on:
  push:
    branches:
      - master
      - devel
    paths:
      - 'shiny/**'
      - '.github/workflows/docker-shiny.yml'
  pull_request:
    branches:
      - master
      - devel
    paths:
      - 'shiny/**'
      - '.github/workflows/docker-shiny.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: bunop/shiny-server_shiny
      LATEST_VERSION: 4.5.3
    strategy:
      matrix:
        include:
        - version: 4.5.3
        - version: 4.0.5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ matrix.version }}
          type=raw,value=latest,enable=${{ matrix.version == env.LATEST_VERSION && github.ref == 'refs/heads/master' }}

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./shiny
        file: ./shiny/Dockerfile
        push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        pull: true
        build-args: |
          SHINY_BASE=rocker/shiny:${{ matrix.version }}
          R_VERSION=${{ matrix.version }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
