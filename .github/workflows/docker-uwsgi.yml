name: Build and push Django Docker images

on:
  push:
    branches:
      - master
      - devel
    paths:
      - 'uwsgi/**'
      - '.github/workflows/docker-uwsgi.yml'
  pull_request:
    branches:
      - master
      - devel
    paths:
      - 'uwsgi/**'
      - '.github/workflows/docker-uwsgi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Compute Docker tags
      id: tags
      run: |
        tags='${{ secrets.DOCKERHUB_USERNAME }}/shiny-server_uwsgi:5.2'
        if [ "${{ github.ref }}" = 'refs/heads/master' ]; then
          tags="$tags,${{ secrets.DOCKERHUB_USERNAME }}/shiny-server_uwsgi:latest"
        fi
        echo "tags=$tags" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./uwsgi
        file: ./uwsgi/Dockerfile
        push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
